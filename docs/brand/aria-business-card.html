<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aria — Business Card</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0e0a07; --bg-2:#1a120c; --bg-glow:#2a1c10; --panel:#1c1410;
    --line:#3a2d20; --line-soft:#2a2016; --text:#f5ede0; --muted:#a08060;
    --gold:#E8A87C; --gold-line:rgba(232,168,124,0.45); --on-gold:#2a1505;
    --head:Georgia,'Times New Roman',serif; --body:'DM Mono','Courier New',monospace;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{
    background:#0a0705; color:var(--text); font-family:var(--body);
    display:flex; flex-wrap:wrap; gap:40px; align-items:center; justify-content:center;
    min-height:100vh; padding:48px;
  }

  /* Standard US business card: 3.5in x 2in */
  .card{
    width:3.5in; height:2in; border-radius:14px; overflow:hidden; position:relative;
    box-shadow:0 18px 50px rgba(0,0,0,0.55); border:1px solid var(--line);
  }

  /* ── FRONT ─────────────────────────────────────────── */
  .front{
    background:
      radial-gradient(140% 120% at 78% -20%, var(--bg-glow) 0%, var(--bg-2) 42%, var(--bg) 78%);
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    text-align:center; padding:0 0.28in;
  }
  .front::after{ /* hairline gold frame */
    content:""; position:absolute; inset:0.12in; border:1px solid var(--gold-line);
    border-radius:8px; pointer-events:none;
  }
  .wordmark{ font-family:var(--head); font-size:62px; letter-spacing:0.16em;
    line-height:1; text-indent:0.16em; }
  .wordmark b{ color:var(--gold); font-weight:400; }
  .acronym{ margin-top:14px; font-size:8.5px; letter-spacing:0.34em;
    text-transform:uppercase; color:var(--muted); }
  .acronym b{ color:var(--gold); font-weight:500; }
  .rule{ width:46px; height:1px; background:var(--gold-line); margin:13px auto 0; }
  .tag{ margin-top:11px; font-size:9px; letter-spacing:0.12em; color:var(--text);
    font-style:italic; font-family:var(--head); opacity:0.9; }

  /* ── BACK ──────────────────────────────────────────── */
  .back{
    background:
      radial-gradient(120% 130% at 0% 120%, var(--bg-glow) 0%, var(--bg-2) 46%, var(--bg) 82%);
    display:flex; flex-direction:column; justify-content:space-between;
    padding:0.34in 0.36in;
  }
  .back .mark{ font-family:var(--head); font-size:21px; letter-spacing:0.16em; }
  .back .mark b{ color:var(--gold); font-weight:400; }
  .back .role{ font-size:8px; letter-spacing:0.26em; text-transform:uppercase;
    color:var(--muted); margin-top:3px; }
  .name{ font-family:var(--head); font-size:19px; letter-spacing:0.02em; }
  .title{ font-size:8.5px; letter-spacing:0.22em; text-transform:uppercase;
    color:var(--gold); margin-top:4px; }
  .contact{ display:flex; flex-direction:column; gap:5px; margin-top:2px; }
  .contact div{ font-size:9.5px; letter-spacing:0.04em; color:var(--text); display:flex; gap:8px; }
  .contact .lbl{ color:var(--muted); width:0.46in; flex:none; text-transform:uppercase;
    font-size:8px; letter-spacing:0.14em; padding-top:1px; }

  .label{ position:absolute; top:-22px; left:2px; font-size:10px; letter-spacing:0.2em;
    text-transform:uppercase; color:#6b5840; }
  .stage{ position:relative; }

  @media print{
    @page{ size:3.5in 2in; margin:0; }
    body{ background:#fff; padding:0; gap:0; display:block; }
    .label{ display:none; }
    .card{ box-shadow:none; border:none; border-radius:0; page-break-after:always; }
    .stage{ margin:0; }
  }
</style>
</head>
<body>

  <div class="stage">
    <div class="label">Front</div>
    <div class="card front">
      <div class="wordmark">ARI<b>A</b></div>
      <div class="acronym"><b>A</b>lways <b>R</b>eady · <b>I</b>nfinitely <b>A</b>daptable</div>
      <div class="rule"></div>
      <div class="tag">Add rest. Ignore admin.</div>
    </div>
  </div>

  <div class="stage">
    <div class="label">Back</div>
    <div class="card back">
      <div>
        <div class="mark">ARI<b>A</b></div>
        <div class="role">Personal Operating System</div>
      </div>
      <div>
        <div class="name">Mariah Dionne Harris</div>
        <div class="title">Co-Founder &amp; CTO</div>
      </div>
      <div class="contact">
        <div><span class="lbl">Email</span> mariah.di.harris@gmail.com</div>
        <div><span class="lbl">Web</span> getaria.app</div>
      </div>
    </div>
  </div>

</body>
</html>
